        <h1>Making rice on a Stove</h1>
        <ol> 
            <li>You need about 1 to 1.5 ratio of rice and water</li>
            <li>Rinse the rice about 2 times to get clean rice</li>
            <li>Now you should boil the rice for about 18 minutes</li>
            <li>After 18 minutes, let the rice rest for some time and now you got good rice to eat.</li>
        </ol>
